<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 280px; padding: 16px; font-family: -apple-system, sans-serif; font-size: 13px; color: #333; }
    h3 { margin: 0 0 12px; font-size: 15px; }
    label { display: block; margin-bottom: 4px; color: #666; font-size: 12px; }
    input {
      width: 100%; box-sizing: border-box;
      border: 1px solid #e0e0e0; border-radius: 6px;
      padding: 6px 8px; font-size: 12px; margin-bottom: 10px;
      font-family: monospace; color: #333;
    }
    input:focus { outline: none; border-color: #10b981; }
    button {
      width: 100%; padding: 8px; background: #10b981; color: white;
      border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;
    }
    button:hover { background: #059669; }
    .status { margin-top: 8px; font-size: 12px; color: #10b981; text-align: center; min-height: 16px; }
    .tip { margin-top: 10px; padding: 8px 10px; background: #f5f5f5; border-radius: 6px; font-size: 11px; color: #999; line-height: 1.5; }
    .help-link { display: block; margin-top: 8px; font-size: 11px; color: #10b981; text-decoration: none; }
    .help-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h3>知识库助手 ⚙️</h3>

  <label>Notion Token</label>
  <input type="password" id="notionToken" placeholder="ntn_..." />

  <label>Notion Database ID</label>
  <input type="text" id="databaseId" placeholder="32位ID，从数据库URL复制" />

  <button id="saveBtn">保存配置</button>
  <div class="status" id="status"></div>

  <div class="tip">配置保存在本地，不会上传。选中网页文字右键即可保存到知识库。</div>
  <a class="help-link" href="https://github.com/getupyang/knowledge-base-extension#notion-setup" target="_blank">→ 如何获取 Notion Token 和 Database ID</a>

  <script>
    chrome.storage.local.get(["notionToken", "databaseId"], (result) => {
      if (result.notionToken) document.getElementById("notionToken").value = result.notionToken;
      if (result.databaseId) document.getElementById("databaseId").value = result.databaseId;
    });

    document.getElementById("saveBtn").addEventListener("click", () => {
      const notionToken = document.getElementById("notionToken").value.trim();
      const databaseId = document.getElementById("databaseId").value.trim();
      const status = document.getElementById("status");

      if (!notionToken || !databaseId) {
        status.style.color = "#ef4444";
        status.textContent = "请填写 Notion Token 和 Database ID";
        return;
      }

      status.style.color = "#999";
      status.textContent = "保存中...";

      chrome.storage.local.set({ notionToken, databaseId }, () => {
        if (chrome.runtime.lastError) {
          status.style.color = "#ef4444";
          status.textContent = "保存失败：" + chrome.runtime.lastError.message;
          return;
        }
        chrome.storage.local.get(["notionToken", "databaseId"], (result) => {
          if (result.notionToken && result.databaseId) {
            chrome.runtime.sendMessage({ type: "RELOAD_CONFIG" });
            status.style.color = "#10b981";
            status.textContent = "✓ 已保存";
            setTimeout(() => status.textContent = "", 2000);
          } else {
            status.style.color = "#ef4444";
            status.textContent = "写入失败，请重试";
          }
        });
      });
    });
  </script>
</body>
</html>
