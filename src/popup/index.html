<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --kb-paper: #fbfcf6;
      --kb-soft: #f1f5ea;
      --kb-ink: #11130f;
      --kb-muted: #5d635a;
      --kb-line: #dce2d6;
      --kb-brand: #1d7f5f;
      --kb-brand-dark: #155f49;
      --kb-field: #ffffff;
      --kb-button-text: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --kb-paper: #141a17;
        --kb-soft: #1d2721;
        --kb-ink: #edf4ee;
        --kb-muted: #a9b6ad;
        --kb-line: #2f3a34;
        --kb-brand: #61b88f;
        --kb-brand-dark: #3f8f6d;
        --kb-field: #111713;
        --kb-button-text: #ffffff;
      }
    }
    body { width: 280px; padding: 16px; font-family: -apple-system, sans-serif; font-size: 13px; color: var(--kb-ink); background: var(--kb-paper); }
    h3 { margin: 0 0 12px; font-size: 15px; }
    label { display: block; margin-bottom: 4px; color: var(--kb-muted); font-size: 12px; }
    input {
      width: 100%; box-sizing: border-box;
      border: 1px solid var(--kb-line); border-radius: 6px;
      padding: 6px 8px; font-size: 12px; margin-bottom: 10px;
      font-family: monospace; color: var(--kb-ink); background: var(--kb-field);
    }
    input:focus { outline: none; border-color: var(--kb-brand); }
    button {
      width: 100%; padding: 8px; background: var(--kb-brand); color: var(--kb-button-text);
      border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;
    }
    button:hover { background: var(--kb-brand-dark); }
    button.kb-secondary {
      background: var(--kb-ink); margin-top: 6px;
    }
    button.kb-secondary:hover { background: #000; }
    .status { margin-top: 8px; font-size: 13px; font-weight: 500; text-align: center; min-height: 20px; padding: 6px 0; border-radius: 6px; }
    .tip { margin-top: 10px; padding: 8px 10px; background: var(--kb-soft); border-radius: 6px; font-size: 11px; color: var(--kb-muted); line-height: 1.5; }
    .help-link { display: block; margin-top: 8px; font-size: 11px; color: var(--kb-brand); text-decoration: none; }
    .help-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h3>知识库助手 ⚙️</h3>

  <label>Notion Token</label>
  <input type="password" id="notionToken" placeholder="ntn_..." />

  <label>Notion Database ID</label>
  <input type="text" id="databaseId" placeholder="32位ID，从数据库URL复制" />

  <button id="saveBtn">保存配置</button>
  <button id="notebookBtn" class="kb-secondary">打开记忆笔记本</button>
  <div class="status" id="status"></div>

  <div class="tip">配置保存在本地，不会上传。选中网页文字右键即可保存到知识库。</div>
  <a class="help-link" href="https://github.com/getupyang/knowledge-base-extension#notion-setup" target="_blank">→ 如何获取 Notion Token 和 Database ID</a>

  <script src="popup.js"></script>
</body>
</html>
