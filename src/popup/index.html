<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Margin</title>
  <style>
    :root {
      --kb-paper: #fbfcf6;
      --kb-soft: #f1f5ea;
      --kb-ink: #11130f;
      --kb-muted: #5d635a;
      --kb-line: #dce2d6;
      --kb-brand: oklch(0.55 0.14 150);
      --kb-brand-dark: oklch(0.42 0.13 150);
      --kb-field: #ffffff;
      --kb-button-text: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --kb-paper: #141a17;
        --kb-soft: #1d2721;
        --kb-ink: #edf4ee;
        --kb-muted: #a9b6ad;
        --kb-line: #2f3a34;
        --kb-brand: #62c97e;
        --kb-brand-dark: #3ea65e;
        --kb-field: #111713;
        --kb-button-text: #ffffff;
      }
    }
    body { width: 320px; padding: 16px; font-family: -apple-system, sans-serif; font-size: 13px; color: var(--kb-ink); background: var(--kb-paper); }
    h3 { margin: 0; font-size: 18px; font-weight: 800; line-height: 1; letter-spacing: 0; }
    .popup-head {
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr);
      column-gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }
    .popup-head img { display: block; width: 36px; height: 36px; flex: 0 0 auto; }
    .popup-head > div {
      display: grid;
      min-width: 0;
      gap: 3px;
      align-content: center;
    }
    .popup-head span { display: block; margin: 0; color: var(--kb-muted); font-size: 12px; font-weight: 600; line-height: 1.18; letter-spacing: 0; }
    label { display: block; margin-bottom: 4px; color: var(--kb-muted); font-size: 12px; }
    input {
      width: 100%; box-sizing: border-box;
      border: 1px solid var(--kb-line); border-radius: 6px;
      padding: 6px 8px; font-size: 12px; margin-bottom: 10px;
      font-family: monospace; color: var(--kb-ink); background: var(--kb-field);
    }
    input:focus { outline: none; border-color: var(--kb-brand); }
    button {
      width: 100%; padding: 8px; background: var(--kb-brand); color: var(--kb-button-text);
      border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;
    }
    button:hover { background: var(--kb-brand-dark); }
    button.kb-secondary {
      background: var(--kb-ink); margin-top: 6px;
    }
    button.kb-secondary:hover { background: #000; }
    .status { margin-top: 8px; font-size: 12px; font-weight: 600; text-align: center; min-height: 18px; padding: 4px 0; border-radius: 6px; color: var(--kb-brand); }
    .status.error { color: #ef4444; }
    .status.neutral { color: var(--kb-muted); }
    .status-grid { margin-top: 12px; display: grid; gap: 8px; }
    .status-row {
      display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; align-items: center;
      padding: 10px; background: var(--kb-soft); border-radius: 6px; border: 1px solid transparent;
    }
    .row-label { display: block; color: var(--kb-muted); font-size: 11px; margin-bottom: 3px; }
    .row-value { display: block; color: var(--kb-ink); font-size: 13px; font-weight: 700; line-height: 1.35; }
    .row-detail { display: block; color: var(--kb-muted); font-size: 11px; line-height: 1.35; margin-top: 2px; }
    .row-action {
      width: auto; min-width: 48px; padding: 5px 8px; border: 1px solid var(--kb-line);
      background: var(--kb-field); color: var(--kb-ink); font-size: 12px; border-radius: 6px;
    }
    .row-action:hover { background: var(--kb-paper); }
    .panel {
      margin-top: 10px; padding: 10px; border: 1px solid var(--kb-line); border-radius: 6px;
      background: color-mix(in srgb, var(--kb-field) 80%, var(--kb-soft));
    }
    .panel[hidden] { display: none; }
    .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .panel-title { font-weight: 700; }
    .panel-close {
      width: auto; min-width: 44px; padding: 4px 8px; border: 1px solid var(--kb-line);
      background: var(--kb-field); color: var(--kb-muted); font-size: 12px; border-radius: 6px;
    }
    .panel-close:hover { background: var(--kb-paper); color: var(--kb-ink); }
    .choice-grid { display: grid; gap: 6px; }
    .choice-grid button { text-align: left; background: var(--kb-field); color: var(--kb-ink); border: 1px solid var(--kb-line); }
    .choice-grid button:hover { border-color: var(--kb-brand); }
    .choice-grid button.is-selected { border-color: var(--kb-brand); color: var(--kb-brand); box-shadow: inset 3px 0 0 var(--kb-brand); }
    .choice-grid button:disabled { opacity: 0.45; cursor: not-allowed; }
    .api-box { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--kb-line); }
    select {
      width: 100%; box-sizing: border-box; margin-bottom: 8px; padding: 7px 8px;
      border: 1px solid var(--kb-line); border-radius: 6px; background: var(--kb-field); color: var(--kb-ink);
    }
    .helper { margin-top: 8px; color: var(--kb-muted); font-size: 11px; line-height: 1.45; }
    .helper strong { color: var(--kb-ink); font-weight: 700; }
    .text-action {
      width: auto; padding: 0; border: 0; background: transparent; color: var(--kb-brand);
      font-size: 11px; font-weight: 700; text-align: left;
    }
    .text-action:hover { background: transparent; color: var(--kb-brand-dark); }
    .secondary-action {
      margin-bottom: 10px; background: var(--kb-field); color: var(--kb-ink);
      border: 1px solid var(--kb-line);
    }
    .secondary-action:hover { background: var(--kb-paper); }
    .danger { margin-top: 8px; background: transparent; color: #c2410c; border: 1px solid color-mix(in srgb, #c2410c 45%, var(--kb-line)); }
    .danger:hover { background: color-mix(in srgb, #c2410c 8%, var(--kb-field)); }
  </style>
</head>
<body>
  <div class="popup-head">
    <img src="../../assets/icons/icon128.png" width="36" height="36" alt="" aria-hidden="true">
    <div>
      <h3>Margin</h3>
      <span>Keep your thinking in Margin</span>
    </div>
  </div>

  <button id="notebookBtn">打开记忆笔记本</button>
  <div class="status" id="status"></div>

  <div class="status-grid">
    <div class="status-row">
      <div>
        <span class="row-label">本机资料库</span>
        <span class="row-value" id="localStatus">正在检查...</span>
        <span class="row-detail" id="localDetail"></span>
      </div>
    </div>
    <div class="status-row">
      <div>
        <span class="row-label">AI 服务</span>
        <span class="row-value" id="aiStatus">正在检查...</span>
        <span class="row-detail" id="aiDetail"></span>
      </div>
      <button class="row-action" id="aiConfigBtn">切换</button>
    </div>
    <div class="status-row">
      <div>
        <span class="row-label">云端备份</span>
        <span class="row-value" id="backupStatus">正在检查...</span>
        <span class="row-detail" id="backupDetail"></span>
      </div>
      <button class="row-action" id="notionConfigBtn">配置</button>
    </div>
  </div>

  <section class="panel" id="aiPanel" hidden>
    <div class="panel-head">
      <div class="panel-title">切换 AI 服务</div>
      <button class="panel-close" id="closeAiPanelBtn">收起</button>
    </div>
    <div class="choice-grid">
      <button data-provider="codex_cli" id="useCodexBtn">Codex 直连</button>
      <button data-provider="claude_code" id="useClaudeBtn">Claude Code 直连</button>
      <button data-provider="api" id="useApiBtn">千问 / OpenRouter API</button>
    </div>
    <div class="api-box" id="claudeConfigFields">
      <label for="claudeBaseUrl">Claude Base URL（可选）</label>
      <input id="claudeBaseUrl" type="text" placeholder="留空使用 Claude Code 默认配置">
    </div>
    <div class="api-box" id="apiConfigFields">
      <label for="apiProvider">API 模型</label>
      <select id="apiProvider">
        <option value="qwen">千问 / Qwen</option>
        <option value="openrouter">OpenRouter</option>
      </select>
      <div id="qwenEndpointWrap">
        <label for="qwenEndpoint">千问服务区域</label>
        <select id="qwenEndpoint">
          <option value="qwen_cn">阿里云百炼 / 中国内地</option>
          <option value="qwen_global">Qwen Global / 新加坡</option>
          <option value="qwen_coding_cn">Qwen Coding Plan / 中国内地</option>
          <option value="qwen_coding_global">Qwen Coding Plan / Global</option>
        </select>
      </div>
      <label for="apiModel">默认模型</label>
      <input id="apiModel" type="text" value="qwen3.5-plus">
      <label for="apiKey">API Key</label>
      <input id="apiKey" type="password" placeholder="粘贴 API Key">
    </div>
    <button id="saveAiBtn">保存并切换</button>
    <div class="helper" id="aiDraftHint">选择一个服务后再保存。</div>
  </section>

  <section class="panel" id="notionPanel" hidden>
    <div class="panel-head">
      <div class="panel-title">Notion 云端备份</div>
      <button class="panel-close" id="closeNotionPanelBtn">收起</button>
    </div>
    <label for="notionToken">Notion Token</label>
    <input id="notionToken" type="password" placeholder="ntn_...">
    <button class="text-action" id="openNotionIntegrationsBtn">打开 Notion integrations 页面</button>
    <label for="notionParentPage">放数据库的 Notion 页面链接</label>
    <input id="notionParentPage" type="text" placeholder="新建一个空白页，授权 integration 后粘贴页面链接">
    <button class="secondary-action" id="createNotionDatabaseBtn">自动创建数据库</button>
    <label for="notionDatabaseId">Database ID 或数据库链接</label>
    <input id="notionDatabaseId" type="text" placeholder="可粘贴整段 Notion 数据库链接">
    <button id="saveNotionBtn">保存并开启</button>
    <button class="danger" id="disableNotionBtn">暂停云端备份</button>
    <div class="helper" id="notionHint">
      <strong>第一次配置：</strong>在 Notion 的 My integrations 创建 integration，复制 Secret；再打开目标数据库，在 Connections 里授权这个 integration。Database ID 可直接粘贴数据库链接，Margin 会自动提取。
    </div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
