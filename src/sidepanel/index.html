<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      color: #333;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    #header {
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #header h2 {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }

    #save-btn {
      padding: 5px 12px;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
    }

    #save-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    #excerpt-box {
      margin: 12px 16px 0;
      padding: 10px 12px;
      background: #f8f8f8;
      border-radius: 8px;
      font-size: 12px;
      color: #666;
      line-height: 1.6;
      border-left: 3px solid #10b981;
    }

    #excerpt-source {
      font-size: 11px;
      color: #aaa;
      margin: 4px 16px 8px;
    }

    #empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #bbb;
      font-size: 13px;
      text-align: center;
      padding: 24px;
      line-height: 1.8;
    }

    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .msg-label {
      font-size: 11px;
      color: #aaa;
      font-weight: 500;
    }

    .msg-bubble {
      padding: 9px 12px;
      border-radius: 8px;
      line-height: 1.6;
      font-size: 13px;
      white-space: pre-wrap;
    }

    .msg.user .msg-bubble {
      background: #f0fdf4;
      border: 1px solid #d1fae5;
      color: #065f46;
    }

    .msg.assistant .msg-bubble {
      background: #f8f9fa;
      border: 1px solid #eee;
      color: #333;
    }

    .msg.assistant.loading .msg-bubble {
      color: #aaa;
    }

    #input-area {
      padding: 12px 16px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      resize: none;
      height: 60px;
      outline: none;
      line-height: 1.5;
    }

    #user-input:focus {
      border-color: #10b981;
    }

    #send-btn {
      padding: 8px 14px;
      background: #333;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      height: 60px;
      white-space: nowrap;
    }

    #send-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div id="header">
    <h2>知识库助手</h2>
    <button id="save-btn" disabled>保存到Notion</button>
  </div>

  <div id="excerpt-box" style="display:none"></div>
  <div id="excerpt-source" style="display:none"></div>

  <div id="empty-state">
    选中网页文字后<br>右键 → 「AI对话」<br>在这里展开思考
  </div>

  <div id="chat-area" style="display:none"></div>

  <div id="input-area">
    <textarea id="user-input" placeholder="输入你的问题（Cmd+Enter发送）" disabled></textarea>
    <button id="send-btn" disabled>发送</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
